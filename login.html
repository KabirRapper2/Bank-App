<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Login - John F Kennedy Bank</title>
</head>
<body class="bg-light">
<header class="bg-primary text-white py-4 mb-5">
    <div class="container">
        <h1><i class="fas fa-university"></i> John F Kennedy Bank</h1>
        <h2 class="lead">Login</h2>
    </div>
</header>
<section class="container" style="max-width: 400px;">
    <div class="card shadow">
        <div class="card-body">
            <h3 class="card-title mb-4"><i class="fas fa-sign-in-alt"></i> Secure Login</h3>
            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label"><i class="fas fa-at"></i> Username:</label>
                    <input type="text" class="form-control" id="username" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label"><i class="fas fa-lock"></i> Password:</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100"><i class="fas fa-check"></i> Login</button>
            </form>
            <p class="mt-3 text-center">Don't have an account? <a href="signup.html"><i class="fas fa-user-plus"></i> Signup here</a>.</p>
        </div>
    </div>
</section>
<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const users = JSON.parse(localStorage.getItem('users')) || [];
    const registeredUser = users.find(user => user.username === username) || null;

    if (!username || !password) {
        alert('Please enter valid credentials.');
        return;
    }

    if (!registeredUser) {
        alert('No registered user found. Please signup first.');
        return;
    }

    if (registeredUser.password !== password) {
        alert('Username or password is incorrect.');
        return;
    }

    const user = {
        name: registeredUser.name,
        username: registeredUser.username,
        email: registeredUser.email,
        accountNumber: registeredUser.accountNumber,
        balance: registeredUser.balance,
        accountType: registeredUser.accountType
    };
    localStorage.setItem('user', JSON.stringify(user));
    localStorage.setItem('balance', registeredUser.balance);
    window.location.href = 'dashboad.html';
});
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
