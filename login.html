<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Login - John F Kennedy Bank</title>
</head>
<body>
<header>
    <h1><i class="fas fa-university"></i> John F Kennedy Bank</h1>
    <h2>Login</h2>
</header>
<section>
    <h3><i class="fas fa-sign-in-alt"></i> Secure Login</h3>
    <form id="loginForm">
        <label for="username"><i class="fas fa-at"></i> Username:</label>
        <input type="text" id="username" required><br><br>
        <label for="password"><i class="fas fa-lock"></i> Password:</label>
        <input type="password" id="password" required><br><br>
        <button type="submit"><i class="fas fa-check"></i> Login</button>
    </form>
    <p>Don't have an account? <a href="signup.html"><i class="fas fa-user-plus"></i> Signup here</a>.</p>
</section>
<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const registeredUser = JSON.parse(localStorage.getItem('registeredUser')) || null;

    if (!username || !password) {
        alert('Please enter valid credentials.');
        return;
    }

    if (registeredUser && registeredUser.username === username && registeredUser.password === password) {
        const user = {
            name: registeredUser.name,
            accountNumber: registeredUser.accountNumber,
            balance: registeredUser.balance,
            accountType: registeredUser.accountType
        };
        localStorage.setItem('user', JSON.stringify(user));
        localStorage.setItem('balance', registeredUser.balance);
        window.location.href = 'dashboad.html';
    } else if (!registeredUser) {
        alert('No registered user found. Please signup first.');
    } else {
        alert('Username or password is incorrect.');
    }
});
</script>
</body>
</html>
