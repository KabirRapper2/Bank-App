<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Fund Transfer - John F Kennedy Bank</title>
</head>
<body class="bg-light">
<header class="bg-primary text-white py-4 mb-5">
    <div class="container d-flex justify-content-between align-items-center">
        <div>
            <h1><i class="fas fa-university"></i> John F Kennedy Bank</h1>
            <h2 class="lead">Fund Transfer</h2>
        </div>
        <a href="dashboad.html" class="btn btn-light">Back to Dashboard</a>
    </div>
</header>
<section class="container" style="max-width: 500px; margin-bottom: 50px;">
    <div class="card shadow">
        <div class="card-body">
            <h3 class="card-title mb-4"><i class="fas fa-exchange-alt"></i> Transfer Funds</h3>
            <form id="transferForm">
                <div class="mb-3">
                    <label for="amount" class="form-label">Amount:</label>
                    <input type="number" class="form-control" id="amount" step="0.01" required>
                </div>
                <div class="mb-3">
                    <label for="recipient" class="form-label">Recipient Account:</label>
                    <input type="text" class="form-control" id="recipient" required>
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label">Description:</label>
                    <input type="text" class="form-control" id="description">
                </div>
                <button type="submit" class="btn btn-primary w-100">Transfer</button>
            </form>
        </div>
    </div>
</section>
<script src="JS/script.js"></script>
<script>
document.getElementById('transferForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const amount = parseFloat(document.getElementById('amount').value);
    const recipient = document.getElementById('recipient').value;
    const description = document.getElementById('description').value || `Transfer to ${recipient}`;
    
    // Load current balance from localStorage
    const currentBalance = parseFloat(localStorage.getItem('balance')) || 5432.10;
    
    if (amount && recipient && amount <= currentBalance && amount > 0) {
        addTransaction(description, -amount, new Date().toLocaleDateString(), 'Transfer');
        alert(`Successfully transferred $${amount.toFixed(2)} to ${recipient}`);
        window.location.href = 'dashboad.html';
    } else if (amount > currentBalance) {
        alert('Insufficient funds. Your current balance is $' + currentBalance.toFixed(2));
    } else {
        alert('Please enter a valid amount and recipient');
    }
});
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
