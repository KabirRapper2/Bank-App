<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Signup - John F Kennedy Bank</title>
</head>
<body class="bg-light">
<header class="bg-primary text-white py-4 mb-5">
    <div class="container">
        <h1><i class="fas fa-university"></i> John F Kennedy Bank</h1>
        <h2 class="lead">Signup</h2>
    </div>
</header>
<section class="container" style="max-width: 500px;">
    <div class="card shadow">
        <div class="card-body">
            <h3 class="card-title mb-4"><i class="fas fa-user-plus"></i> Create Your Account</h3>
            <form id="signupForm">
                <div class="mb-3">
                    <label for="name" class="form-label"><i class="fas fa-user"></i> Full Name:</label>
                    <input type="text" class="form-control" id="name" required>
                </div>
                <div class="mb-3">
                    <label for="username" class="form-label"><i class="fas fa-at"></i> Username:</label>
                    <input type="text" class="form-control" id="username" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label"><i class="fas fa-envelope"></i> Email:</label>
                    <input type="email" class="form-control" id="email" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label"><i class="fas fa-lock"></i> Password:</label>
                    <input type="password" class="form-control" id="password" required>
                    <div id="password-strength" class="mt-2"></div>
                </div>
                <div class="mb-3">
                    <label for="accountType" class="form-label"><i class="fas fa-credit-card"></i> Account Type:</label>
                    <select class="form-select" id="accountType" required>
                        <option value="Checking">Checking</option>
                        <option value="Savings">Savings</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="balance" class="form-label"><i class="fas fa-dollar-sign"></i> Starting Balance:</label>
                    <input type="number" class="form-control" id="balance" value="1000" min="0" required>
                </div>
                <button type="submit" class="btn btn-primary w-100"><i class="fas fa-check"></i> Signup</button>
            </form>
            <p class="mt-3 text-center">Already have an account? <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login here</a>.</p>
        </div>
    </div>
</section>
<script>
document.getElementById('password').addEventListener('input', function() {
    const password = this.value;
    const strengthDiv = document.getElementById('password-strength');
    let strength = 0;
    if (password.length >= 8) strength++;
    if (/[A-Z]/.test(password)) strength++;
    if (/[a-z]/.test(password)) strength++;
    if (/[0-9]/.test(password)) strength++;
    if (/[^A-Za-z0-9]/.test(password)) strength++;

    const colors = ['#dc3545', '#ffc107', '#fd7e14', '#20c997', '#28a745'];
    const texts = ['Very Weak', 'Weak', 'Fair', 'Good', 'Strong'];
    strengthDiv.textContent = texts[strength - 1] || '';
    strengthDiv.style.color = colors[strength - 1] || '#dc3545';
});

document.getElementById('signupForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!name || !username || !email || !password) {
        alert('Please fill in all fields.');
        return;
    }

    if (password.length < 8) {
        alert('Password must be at least 8 characters long.');
        return;
    }

    const accountNumber = Math.floor(1000000000 + Math.random() * 9000000000).toString();
    const accountType = document.getElementById('accountType').value;
    const balance = parseFloat(document.getElementById('balance').value) || 0;
    const user = { name, username, email, password, accountNumber, accountType, balance };
    localStorage.setItem('user', JSON.stringify({ name, accountNumber, accountType, balance }));
    localStorage.setItem('registeredUser', JSON.stringify(user));
    localStorage.setItem('balance', balance);
    window.location.href = 'dashboad.html';
});
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
