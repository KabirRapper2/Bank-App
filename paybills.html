<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/global.css">
    <title>Pay Bills - John F Kennedy Bank</title>
</head>
<body>
<header>
    <h1>John F Kennedy Bank</h1>
    <h2>Pay Bills</h2>
    <a href="dashboad.html">Back to Dashboard</a>
</header>
<section>
    <h3>Pay a Bill</h3>
    <form id="billForm">
        <label for="billType">Bill Type:</label>
        <select id="billType" required>
            <option value="">Select Bill Type</option>
            <option value="Electricity">Electricity</option>
            <option value="Water">Water</option>
            <option value="Gas">Gas</option>
            <option value="Internet">Internet</option>
            <option value="Phone">Phone</option>
            <option value="Other">Other</option>
        </select><br><br>
        <label for="amount">Amount:</label>
        <input type="number" id="amount" step="0.01" required><br><br>
        <label for="accountNumber">Account Number:</label>
        <input type="text" id="accountNumber" required><br><br>
        <button type="submit">Pay Bill</button>
    </form>
</section>
<script src="JS/script.js"></script>
<script>
document.getElementById('billForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const billType = document.getElementById('billType').value;
    const amount = parseFloat(document.getElementById('amount').value);
    const accountNumber = document.getElementById('accountNumber').value;
    
    // Load current balance from localStorage
    const currentBalance = parseFloat(localStorage.getItem('balance')) || 5432.10;
    
    if (billType && amount && accountNumber && amount <= currentBalance && amount > 0) {
        // Add transaction with proper category
        addTransaction(`${billType} Bill Payment to ${accountNumber}`, -amount, new Date().toLocaleDateString(), 'Bills');
        alert(`Successfully paid $${amount.toFixed(2)} for ${billType} bill to account ${accountNumber}`);
        // Redirect back to dashboard
        window.location.href = 'dashboad.html';
    } else if (amount > currentBalance) {
        alert('Insufficient funds. Your current balance is $' + currentBalance.toFixed(2));
    } else {
        alert('Please fill in all fields with valid information');
    }
});
</script>
</body>
</html>
