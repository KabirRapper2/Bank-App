<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Pay Bills - John F Kennedy Bank</title>
</head>
<body class="bg-light">
<header class="bg-primary text-white py-4 mb-5">
    <div class="container d-flex justify-content-between align-items-center">
        <div>
            <h1><i class="fas fa-university"></i> John F Kennedy Bank</h1>
            <h2 class="lead">Pay Bills</h2>
        </div>
        <a href="dashboad.html" class="btn btn-light">Back to Dashboard</a>
    </div>
</header>
<section class="container" style="max-width: 500px; margin-bottom: 50px;">
    <div class="card shadow">
        <div class="card-body">
            <h3 class="card-title mb-4"><i class="fas fa-file-invoice-dollar"></i> Pay a Bill</h3>
            <form id="billForm">
                <div class="mb-3">
                    <label for="billType" class="form-label">Bill Type:</label>
                    <select class="form-select" id="billType" required>
                        <option value="">Select Bill Type</option>
                        <option value="Electricity">Electricity</option>
                        <option value="Water">Water</option>
                        <option value="Gas">Gas</option>
                        <option value="Internet">Internet</option>
                        <option value="Phone">Phone</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="amount" class="form-label">Amount:</label>
                    <input type="number" class="form-control" id="amount" step="0.01" required>
                </div>
                <div class="mb-3">
                    <label for="accountNumber" class="form-label">Account Number:</label>
                    <input type="text" class="form-control" id="accountNumber" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Pay Bill</button>
            </form>
        </div>
    </div>
</section>
<script src="JS/script.js"></script>
<script>
document.getElementById('billForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const billType = document.getElementById('billType').value;
    const amount = parseFloat(document.getElementById('amount').value);
    const accountNumber = document.getElementById('accountNumber').value;
    
    // Load current balance from localStorage
    const currentBalance = parseFloat(localStorage.getItem('balance')) || 5432.10;
    
    if (billType && amount && accountNumber && amount <= currentBalance && amount > 0) {
        // Add transaction with proper category
        addTransaction(`${billType} Bill Payment to ${accountNumber}`, -amount, new Date().toLocaleDateString(), 'Bills');
        alert(`Successfully paid $${amount.toFixed(2)} for ${billType} bill to account ${accountNumber}`);
        // Redirect back to dashboard
        window.location.href = 'dashboad.html';
    } else if (amount > currentBalance) {
        alert('Insufficient funds. Your current balance is $' + currentBalance.toFixed(2));
    } else {
        alert('Please fill in all fields with valid information');
    }
});
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
