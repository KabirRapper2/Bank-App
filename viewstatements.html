<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>View Statements - John F Kennedy Bank</title>
</head>
<body class="bg-light">
<header class="bg-primary text-white py-4 mb-5">
    <div class="container d-flex justify-content-between align-items-center">
        <div>
            <h1><i class="fas fa-university"></i> John F Kennedy Bank</h1>
            <h2 class="lead">Account Statements</h2>
        </div>
        <a href="dashboad.html" class="btn btn-light">Back to Dashboard</a>
    </div>
</header>
<section class="container" style="margin-bottom: 50px;">
    <div class="card shadow">
        <div class="card-body">
            <h3 class="card-title mb-4"><i class="fas fa-history"></i> Transaction History</h3>
            <div id="statement" class="mb-4">
                <!-- Statement will be populated by JS -->
            </div>
            <button class="btn btn-success" onclick="downloadStatement()"><i class="fas fa-download"></i> Download PDF</button>
        </div>
    </div>
</section>
<script src="JS/script.js"></script>
<script>
function displayStatement() {
    const statementDiv = document.getElementById('statement');
    statementDiv.innerHTML = '<h4>Account Holder: ' + user.name + '</h4><h4>Account Number: ' + user.accountNumber + '</h4><h4>Current Balance: $' + balance.toFixed(2) + '</h4><h4>Transactions:</h4><ul>';
    transactions.forEach(transaction => {
        statementDiv.innerHTML += `<li>${transaction.description}: $${transaction.amount.toFixed(2)} on ${transaction.date}</li>`;
    });
    statementDiv.innerHTML += '</ul>';
}

function downloadStatement() {
    alert('PDF download feature coming soon. For now, print this page.');
    window.print();
}

document.addEventListener('DOMContentLoaded', displayStatement);
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
