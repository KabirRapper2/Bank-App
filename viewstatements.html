<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/global.css">
    <title>View Statements - John F Kennedy Bank</title>
</head>
<body>
<header>
    <h1>John F Kennedy Bank</h1>
    <h2>Account Statements</h2>
    <a href="dashboad.html">Back to Dashboard</a>
</header>
<section>
    <h3>Transaction History</h3>
    <div id="statement">
        <!-- Statement will be populated by JS -->
    </div>
    <button onclick="downloadStatement()">Download PDF</button>
</section>
<script src="JS/script.js"></script>
<script>
function displayStatement() {
    const statementDiv = document.getElementById('statement');
    statementDiv.innerHTML = '<h4>Account Holder: ' + user.name + '</h4><h4>Account Number: ' + user.accountNumber + '</h4><h4>Current Balance: $' + balance.toFixed(2) + '</h4><h4>Transactions:</h4><ul>';
    transactions.forEach(transaction => {
        statementDiv.innerHTML += `<li>${transaction.description}: $${transaction.amount.toFixed(2)} on ${transaction.date}</li>`;
    });
    statementDiv.innerHTML += '</ul>';
}

function downloadStatement() {
    alert('PDF download feature coming soon. For now, print this page.');
    window.print();
}

document.addEventListener('DOMContentLoaded', displayStatement);
</script>
</body>
</html>
