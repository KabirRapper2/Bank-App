<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>View Statements - John F Kennedy Bank</title>
</head>
<body class="bg-light">
<header class="bg-primary text-white py-4 mb-5">
    <div class="container d-flex justify-content-between align-items-center">
        <div>
            <h1><i class="fas fa-university"></i> John F Kennedy Bank</h1>
            <h2 class="lead">Account Statements</h2>
        </div>
        <a href="dashboad.html" class="btn btn-light">Back to Dashboard</a>
    </div>
</header>
<section class="container" style="margin-bottom: 50px;">
    <div class="card shadow">
        <div class="card-body">
            <h3 class="card-title mb-4"><i class="fas fa-history"></i> Transaction History</h3>
            <div id="statement" class="mb-4">
                <!-- Statement will be populated by JS -->
            </div>
            <button class="btn btn-success" onclick="downloadStatement()"><i class="fas fa-download"></i> Download PDF</button>
        </div>
    </div>
</section>
<script src="JS/script.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
<script>
function displayStatement() {
    const statementDiv = document.getElementById('statement');
    const user = AppState.user || { name: 'John Doe', accountNumber: '1234567890', accountType: 'Checking' };
    const balance = parseFloat(AppState.balance || 0);
    const transactions = AppState.transactions || [];

    let html = `
        <div class="mb-3">
            <h4>Account Holder: ${user.name}</h4>
            <h4>Account Number: ${user.accountNumber}</h4>
            <h4>Account Type: ${user.accountType || 'Checking'}</h4>
            <h4>Current Balance: ${formatCurrency(balance)}</h4>
        </div>
        <div>
            <h5>Transactions:</h5>
            <ul class="list-group" style="max-width: 720px;">
    `;

    if (transactions.length === 0) {
        html += '<li class="list-group-item">No transactions available.</li>';
    } else {
        transactions.forEach(transaction => {
            const amountText = transaction.amount >= 0 ? `+${formatCurrency(transaction.amount)}` : formatCurrency(transaction.amount);
            html += `<li class="list-group-item d-flex justify-content-between align-items-center">
                        <div>
                            <strong>${transaction.description}</strong><br>
                            <small class="text-muted">${transaction.category || 'Other'} • ${formatDate(transaction.date)}</small>
                        </div>
                        <span class="${transaction.amount >= 0 ? 'text-success' : 'text-danger'}">${amountText}</span>
                    </li>`;
        });
    }

    html += '</ul>';
    statementDiv.innerHTML = html;
}

function downloadStatement() {
    const statementDiv = document.getElementById('statement');
    if (!statementDiv) {
        alert('Statement content not found.');
        return;
    }

    const opt = {
        margin:       10,
        filename:     'JFK-Statement.pdf',
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true, logging: false },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(statementDiv).save()
        .then(() => showNotification('Statement downloaded as PDF.', 'success'))
        .catch(error => {
            console.error(error);
            alert('Unable to download PDF. Please try again or use the browser print option.');
        });
}

document.addEventListener('DOMContentLoaded', displayStatement);
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
